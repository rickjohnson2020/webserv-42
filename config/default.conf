
# main demo site
server {
	listen 0.0.0.0:8080;
	client_max_body_size 10M;
	error_page 404 ./www/errors/404.html;

	location / {
		root ./www/site;
		index index.html;
		allowed_methods GET;
	}
	location /upload {
		root ./www/uploads;
		allowed_methods GET POST DELETE;
		upload_store ./www/uploads;
		autoindex on;
	}
	location /cgi-bin {
		root ./www/cgi-bin;
		allowed_methods GET POST;
		cgi ./py /usr/bin/python3;
	}
	location /old {
		return 301 /;
	}
	location /private {
		root ./www/private;
		allowed_methods GET;
		autoindex off;
	}
}

# different site
server {
	listen 0.0.0.0:8081;
	location / {
		root ./www/site2;
		index index.html;
		allowed_methods GET;
	}
}



